name: Build, Sign (optional), and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [ arm64, x64 ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm i -g nativefier@52.0.0
      - run: node scripts/icon-check.mjs
      - name: Build
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npm run build:mac:arm64
          else
            npm run build:mac:x64
          fi
      - name: Locate app
        id: loc
        run: |
          APP_DIR=$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type d -name "Space-darwin-*" | tail -n 1)
          echo "app_dir=$APP_DIR" >> $GITHUB_OUTPUT
      - name: Import signing certificate (optional)
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > mac_cert.p12
          security create-keychain -p temp build.keychain
          security import mac_cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security default-keychain -d user -s build.keychain
          security unlock-keychain -p temp build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k temp build.keychain
      - name: Codesign app (optional)
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
        env:
          MAC_SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
        run: |
          APP_PATH="${{ steps.loc.outputs.app_dir }}/Space.app"
          # Hardened runtime + entitlements are required for notarization; the
          # camera/mic entitlements keep WebRTC working under the hardened runtime.
          /usr/bin/codesign --force --deep --options runtime \
            --entitlements assets/entitlements.mac.plist \
            --sign "$MAC_SIGNING_IDENTITY" "$APP_PATH"
          /usr/bin/codesign --verify --deep --strict "$APP_PATH"
      - name: Notarize and staple app (optional)
        if: ${{ secrets.APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="${{ steps.loc.outputs.app_dir }}/Space.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" Space.zip
          xcrun notarytool submit Space.zip --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun stapler staple "$APP_PATH"
      - name: Zip artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.loc.outputs.app_dir }}/Space.app" app-mac-${{ matrix.arch }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: space-mac-${{ matrix.arch }}
          path: app-mac-${{ matrix.arch }}.zip

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm i -g nativefier@52.0.0
      - name: Verify icons
        run: node scripts/icon-check.mjs
        shell: bash
      - name: Build Windows
        shell: bash
        run: |
          rm -rf dist-win
          mkdir -p dist-win
          # nativefier@52 ignores --out on the Windows runner and builds the app
          # into the current working directory instead. So we build into dist-win
          # as the cwd to force a predictable, isolated output location.
          ( cd dist-win && npx nativefier@52.0.0 "https://space.studiofritzgnad.de" \
            --name "Space" \
            --platform windows \
            --arch x64 \
            --icon "../assets/space_icon.ico" \
            --single-instance \
            --disable-dev-tools \
            --browserwindow-options '{"frame":true,"fullscreenable":true}' \
            --app-version "1.8.0" \
            --build-version "1.8.0" \
            --win32metadata '{"CompanyName":"Studio Fritz Gnad","FileDescription":"Space","ProductName":"Space"}' )
          echo "=== dist-win contents (recursive) ==="
          ls -laR dist-win/ || true
          # Fail early if nativefier silently produced no app (known Windows-runner issue)
          if [ -z "$(find dist-win -name 'Space.exe' -print -quit)" ]; then
            echo "ERROR: nativefier did not produce Space.exe under dist-win"
            exit 1
          fi
      - name: Zip artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Locate the built app by finding Space.exe wherever nativefier placed it,
          # rather than assuming a specific top-level directory name/structure.
          $exe = Get-ChildItem -Path "dist-win" -Recurse -Filter "Space.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Host "ERROR: Space.exe not found under dist-win. Contents:"
            if (Test-Path "dist-win") {
              Get-ChildItem -Path "dist-win" -Recurse | Select-Object FullName | Format-Table -AutoSize
            } else {
              Write-Host "dist-win directory does not exist."
            }
            exit 1
          }
          $appDir = $exe.Directory.FullName
          Write-Host "Zipping app dir: $appDir"
          Compress-Archive -Path $appDir -DestinationPath app-win-x64.zip -Force
          Write-Host "Created app-win-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: space-win-x64
          path: app-win-x64.zip

  release:
    name: Release on tag
    needs: [ macos, windows ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/space-mac-arm64/app-mac-arm64.zip
            dist/space-mac-x64/app-mac-x64.zip
            dist/space-win-x64/app-win-x64.zip
          generate_release_notes: true


